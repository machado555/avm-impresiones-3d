<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080C14"/>
      <stop offset="100%" stop-color="#0D1628"/>
    </linearGradient>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B2FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="gB" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#00B2FF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gC" x1="0" y1="0.8" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B3F9E" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#00B2FF" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B2FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080C14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow sutil -->
  <ellipse cx="600" cy="315" rx="400" ry="280" fill="url(#glow)"/>

  <!-- Isotipo grande centrado a la izquierda -->
  <g transform="translate(200, 40) scale(1.7)">
    <path d="M80 28 L26 72 L80 88 Z" fill="url(#gA)"/>
    <path d="M80 28 L134 72 L80 88 Z" fill="url(#gB)"/>
    <path d="M26 72 L80 132 L134 72 L80 88 Z" fill="url(#gC)"/>
  </g>

  <!-- Texto derecho -->
  <text x="580" y="270" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="110" font-weight="600" letter-spacing="18" fill="#FFFFFF">AVM</text>
  <text x="583" y="318" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="18" font-weight="400" letter-spacing="7" fill="rgba(255,255,255,0.35)">DIGITAL MANUFACTURING</text>

  <!-- Línea separadora -->
  <line x1="555" y1="220" x2="555" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Tagline inferior -->
  <text x="600" y="420" text-anchor="middle" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="22" font-weight="300" letter-spacing="1" fill="rgba(255,255,255,0.22)">De la pantalla a tus manos.</text>
</svg>
