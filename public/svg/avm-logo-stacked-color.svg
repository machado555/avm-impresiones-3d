<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B2FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="gB" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#00B2FF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gC" x1="0" y1="0.8" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B3F9E" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#00B2FF" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- ISOTIPO centrado horizontalmente en 200px -->
  <g transform="translate(20, 0) scale(1)">
    <path d="M80 10 L26 54 L80 70 Z" fill="url(#gA)"/>
    <path d="M80 10 L134 54 L80 70 Z" fill="url(#gB)"/>
    <path d="M26 54 L80 114 L134 54 L80 70 Z" fill="url(#gC)"/>
  </g>

  <!-- AVM wordmark -->
  <text x="100" y="148" text-anchor="middle" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="40" font-weight="600" letter-spacing="8" fill="#FFFFFF">AVM</text>

  <!-- tagline -->
  <text x="100" y="166" text-anchor="middle" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="7.5" font-weight="400" letter-spacing="3.5" fill="rgba(255,255,255,0.35)">DIGITAL MANUFACTURING</text>
</svg>
